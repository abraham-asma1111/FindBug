version: '3.8'

services:
  # Simulation Database
  simulation-db:
    image: postgres:15
    container_name: simulation-db
    environment:
      POSTGRES_DB: simulation_db
      POSTGRES_USER: simulation_user
      POSTGRES_PASSWORD: simulation_pass
    ports:
      - "5433:5432"
    volumes:
      - simulation_data:/var/lib/postgresql/data
    networks:
      - simulation-network

  # Simulation API
  simulation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simulation-api
    environment:
      - DATABASE_URL=postgresql://simulation_user:simulation_pass@simulation-db:5432/simulation_db
      - SECRET_KEY=simulation-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    ports:
      - "8001:8001"
    depends_on:
      - simulation-db
    volumes:
      - ./src:/app/src
      - simulation_logs:/app/logs
    networks:
      - simulation-network
    restart: unless-stopped

volumes:
  simulation_data:
  simulation_logs:

networks:
  simulation-network:
    driver: bridge
