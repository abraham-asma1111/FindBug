[pytest]
# Pytest configuration for Bug Bounty Platform

# Python path
pythonpath = .

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require database)
    slow: Slow running tests
    auth: Authentication tests
    subscription: Subscription tests
    ptaas: PTaaS tests
    simulation: Simulation platform tests
    ssdlc: SSDLC integration tests

# Coverage options
[coverage:run]
source = src
omit = 
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
